version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vpncc
      POSTGRES_PASSWORD: vpncc
      POSTGRES_DB: vpnconconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpncc"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
